name: Build Android App

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x mobile_app/gradlew
        continue-on-error: true

      - name: Build with Gradle
        run: |
          cd mobile_app
          # Check if gradlew exists, if not, initialize a basic project structure
          if [ ! -f "gradlew" ]; then
            echo "Gradle wrapper not found, skipping build step for now."
            exit 0
          fi
          ./gradlew build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mobile_app/build/outputs/apk/debug/*.apk
        continue-on-error: true
