name: Build Android App

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies and Scaffold
        run: |
          cd mobile_app
          # Re-create the project structure to ensure android/ folder exists
          flutter create --org com.barbie --project-name ai_ide . --overwrite
          
          # Move misplaced source code to the correct location in the android project
          mkdir -p android/app/src/main/kotlin/com/barbie/ai_ide/sandbox
          cp src/main/kotlin/com/barbie/ai_ide/sandbox/LocalSandbox.kt android/app/src/main/kotlin/com/barbie/ai_ide/sandbox/LocalSandbox.kt
          
          flutter pub get

      - name: Build APK
        run: |
          cd mobile_app
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mobile_app/build/app/outputs/flutter-apk/app-debug.apk
