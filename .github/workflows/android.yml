name: Build Android App

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x mobile_app/gradlew
        continue-on-error: true

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies and Scaffold
        run: |
          cd mobile_app
          # Re-create the project structure to ensure android/ folder exists
          flutter create --org com.barbie --project-name ai_ide . --overwrite
          flutter pub get

      - name: Build APK
        run: |
          cd mobile_app
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mobile_app/build/outputs/apk/debug/*.apk
        continue-on-error: true
